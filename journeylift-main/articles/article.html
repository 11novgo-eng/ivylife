<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文章 — 漫途旅遊誌</title>
<meta name="description" id="meta-desc" content="漫途旅遊誌 — 台灣慢旅行、咖啡廳、餐廳開箱文">
<meta name="keywords" id="meta-keywords" content="漫途,旅遊,台灣">
<meta name="robots" content="index, follow">
<link rel="canonical" id="canonical-url" href="https://journeylift.com.tw">
<meta property="og:type" content="article">
<meta property="og:site_name" content="漫途 — 旅遊誌">
<meta property="og:locale" content="zh_TW">
<meta property="og:title" content="漫途">
<meta property="og:description" content="">
<meta property="og:url" content="">
<meta property="og:image" content="https://journeylift.com.tw/og-default.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="漫途">
<meta name="twitter:description" content="">
<meta name="twitter:image" content="https://journeylift.com.tw/og-default.jpg">
<script type="application/ld+json" id="schema-jsonld">{}</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#faf8f5;--surface:#fff;--border:#e8e0d0;
  --text:#2a2420;--text2:#6b5a4e;--text3:#a89880;
  --accent:#c4956a;--accent2:#8b6a4f;
  --font-serif:'Cormorant Garamond',serif;--font-sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:15px;line-height:1.8}
a{color:var(--accent);text-decoration:none}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--font-serif);font-size:1.5rem;color:var(--accent2)}
.logo span{font-style:italic}
nav{display:flex;gap:2rem}
nav a{font-size:0.78rem;letter-spacing:0.1em;color:var(--text2);transition:color 0.2s}
nav a:hover{color:var(--accent)}

.article-wrap{max-width:720px;margin:0 auto;padding:3rem 2rem 6rem}

.art-header{margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.art-emoji{font-size:4rem;line-height:1;margin-bottom:1rem}
.art-meta{font-size:0.72rem;letter-spacing:0.12em;color:var(--text3);margin-bottom:1rem}
.art-meta span{margin-right:1rem}
.art-title{font-family:var(--font-serif);font-size:2.5rem;color:var(--text);line-height:1.3;margin-bottom:1rem}
.art-excerpt{font-size:0.95rem;color:var(--text2);line-height:1.8;font-style:italic}
.art-keywords{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:1rem}
.kw-tag{background:none;border:1px solid var(--border);padding:0.2rem 0.6rem;font-size:0.68rem;color:var(--text3)}

.art-content{color:var(--text);line-height:2}
.art-content h2{font-family:var(--font-serif);font-size:1.6rem;color:var(--accent2);margin:2rem 0 0.8rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)}
.art-content h3{font-family:var(--font-serif);font-size:1.2rem;color:var(--text2);margin:1.5rem 0 0.5rem}
.art-content p{margin-bottom:1.2rem}
.art-content img{max-width:100%;margin:1.5rem 0;display:block}
.art-content blockquote{border-left:3px solid var(--accent);padding-left:1.2rem;color:var(--text2);margin:1.5rem 0;font-style:italic}
.art-content ul,.art-content ol{padding-left:1.5rem;margin-bottom:1rem}
.art-content li{margin-bottom:0.4rem}
.art-content a{color:var(--accent)}

.video-wrap{margin:2rem 0;aspect-ratio:16/9;background:#000}
.video-wrap iframe{width:100%;height:100%;border:none}

.art-footer{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.back-btn{font-size:0.78rem;color:var(--text2);letter-spacing:0.05em}
.back-btn:hover{color:var(--accent)}
.art-date{font-size:0.72rem;color:var(--text3)}

.loading{text-align:center;padding:6rem;color:var(--text3)}
.not-found{text-align:center;padding:6rem}
.not-found h2{font-family:var(--font-serif);font-size:2rem;color:var(--text2);margin-bottom:1rem}

footer{background:var(--surface);border-top:1px solid var(--border);padding:2rem;text-align:center;font-size:0.75rem;color:var(--text3)}

/* ── SHOP INFO CARD ─────────────────────────────────────────────────────── */
.shop-card{background:var(--surface,#1a1714);border:1px solid var(--border,#2a2520);padding:1.8rem;margin:2.5rem 0;font-family:var(--font-sans,'Inter',sans-serif)}
.shop-card-title{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent,#c9a96e);margin-bottom:1.2rem;display:flex;align-items:center;gap:0.5rem}
.shop-card-title::after{content:'';flex:1;height:1px;background:var(--border,#2a2520)}
.shop-card-name{font-size:1.15rem;font-weight:600;color:var(--text,#e8e0d4);margin-bottom:1rem}
.shop-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem 1.5rem;margin-bottom:1.2rem}
@media(max-width:600px){.shop-card-grid{grid-template-columns:1fr}}
.shop-card-row{display:flex;align-items:flex-start;gap:0.5rem;font-size:0.8rem;color:var(--text2,#a09080);line-height:1.5}
.shop-card-row .sci{width:16px;flex-shrink:0;opacity:0.6;margin-top:2px}
.shop-card-row a{color:var(--text2,#a09080);text-decoration:none;border-bottom:1px solid transparent;transition:border-color 0.15s}
.shop-card-row a:hover{border-color:var(--accent,#c9a96e);color:var(--accent,#c9a96e)}
.shop-social{display:flex;gap:0.6rem;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border,#2a2520)}
.shop-social a{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.9rem;border:1px solid var(--border,#2a2520);font-size:0.72rem;color:var(--text2,#a09080);text-decoration:none;letter-spacing:0.05em;transition:all 0.15s}
.shop-social a:hover{border-color:var(--accent,#c9a96e);color:var(--accent,#c9a96e)}

.share-bar{display:flex;align-items:center;gap:0.8rem;padding:1.5rem 0;border-top:1px solid var(--border,#2a2520);border-bottom:1px solid var(--border,#2a2520);margin:2rem 0}
.share-label{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mist,#8a8278);flex-shrink:0}
.share-btns{display:flex;gap:0.5rem;flex-wrap:wrap}
.contact-line-btn{background:#06C755;color:#fff!important;border:none}
.share-btn{.share-btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 1rem;border:1px solid var(--border2,rgba(200,169,110,0.2));background:none;font-size:0.72rem;color:var(--text2,#b8b0a0);cursor:pointer;font-family:inherit;letter-spacing:0.05em;transition:all 0.2s;text-decoration:none}
.share-btn:hover{border-color:var(--accent,#c9a96e);color:var(--accent,#c9a96e)}
.share-btn.copied{border-color:#4caf50;color:#4caf50}

.footer-copyright {
  font-size: 0.82rem;
  color: var(--muted, #8a7f72);
  margin-bottom: 0.6rem;
}
.footer-contact {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.9rem;
  color: #06C755;
  text-decoration: none;
  border: 1.5px solid #06C755;
  padding: 0.4rem 1.2rem;
  border-radius: 20px;
  transition: background 0.2s, color 0.2s;
}
.footer-contact:hover { background: #06C755; color: #fff; }
footer { text-align: center; padding: 2rem 1rem 1.5rem; border-top: 1px solid var(--border, #e8e0d4); margin-top: 2rem; }
</style>
</head>
<body>

<header>
  <a href="/" class="logo"><span>漫途</span>旅遊誌</a>
  <nav>
    <a href="/">首頁</a>
    <a href="/articles">文章</a>
  </nav>
</header>

<div class="article-wrap" id="article-wrap">
  <div class="loading">載入中...</div>
</div>

<footer>
  <div class="footer-copyright">© 2026 漫途旅遊誌 · 用文字記錄每一段旅程</div>
  <a class="footer-contact" href="https://lin.ee/ZBhZQL3" target="_blank" rel="noopener">
    <span>💬</span> LINE 聯絡旅遊誌
  </a>
</footer>

<script>
const sb = supabase.createClient(
  'https://zsebcpfblecwumbaxeaz.supabase.co',
  'sb_publishable_L2DOfeM0cAJqwlVCr1LwtA_jE9MBNDn'
);


  
function copyLink(btn){
  navigator.clipboard.writeText(location.href).then(()=>{
    btn.textContent='✅ 已複製！';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='🔗 複製連結';btn.classList.remove('copied');},2000);
  }).catch(()=>{
    // fallback
    const el=document.createElement('input');
    el.value=location.href;document.body.appendChild(el);
    el.select();document.execCommand('copy');document.body.removeChild(el);
    btn.textContent='✅ 已複製！';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='🔗 複製連結';btn.classList.remove('copied');},2000);
  });
}
function renderShopCard(info){
    if(!info||!Object.keys(info).some(k=>info[k])) return '';
    const row=(icon,label,val,link)=>val?`<div class="shop-card-row"><span class="sci">${icon}</span><span>${link?`<a href="${link}" target="_blank">${val}</a>`:val}</span></div>`:'';
    const social=[];
    if(info.fb) social.push(`<a href="${info.fb}" target="_blank">📘 Facebook</a>`);
    if(info.ig) social.push(`<a href="${info.ig}" target="_blank">📷 Instagram</a>`);
    if(info.line) social.push(`<a href="${info.line}" target="_blank">💬 LINE</a>`);
    if(info.maps) social.push(`<a href="${info.maps}" target="_blank">🗺️ Google Maps</a>`);
    return `<div class="shop-card">
      <div class="shop-card-title">店家資訊</div>
      ${info.name?'<div class="shop-card-name">'+info.name+'</div>':''}
      <div class="shop-card-grid">
        ${row('📍','地址',info.address,info.maps)}
        ${row('📞','電話',info.phone,info.phone?'tel:'+info.phone.replace(/[^+\d]/g,''):'')}
        ${row('🕐','營業時間',info.hours)}
        ${row('💰','消費',info.price_note)}
        ${row('🅿️','停車',info.parking)}
        ${row('🌐','官網',info.website,info.website)}
      </div>
      ${social.length?'<div class="shop-social">'+social.join('')+'</div>':''}
    </div>`;
  }

async function load(){
  const slug = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop());
  if(!slug){ notFound(); return; }

  const {data} = await sb.from('articles')
    .select('*')
    .eq('slug', slug)
    .eq('status','published')
    .single();

  if(!data){ notFound(); return; }

  
  // Update OG meta for social sharing
  const setMeta = (sel, val) => {
    const el = document.querySelector(sel);
    if(el && val) el.setAttribute(el.hasAttribute('content')?'content':'href', val);
  };
  const ogImg = data.cover_image || 'https://journeylift.com.tw/og-default.jpg';
  document.title = data.title + ' — 漫途旅遊誌';
  const pageUrl = 'https://journeylift.com.tw/articles/' + slug;
  const seoDesc = (data.excerpt || data.title || '').substring(0, 160);
  const rawKw = Array.isArray(data.keywords) ? data.keywords : (data.keywords ? String(data.keywords).split(',') : []);
  const kwStr = [...new Set([...rawKw, data.city, data.category].filter(Boolean))].join(',');
  // Canonical & meta
  const setId = (id, attr, val) => { const el=document.getElementById(id); if(el&&val) el.setAttribute(attr,val); };
  setId('canonical-url','href', pageUrl);
  setId('meta-desc','content', seoDesc);
  setId('meta-keywords','content', kwStr||'漫途,旅遊,台灣');
  // Schema.org
  const schEl = document.getElementById('schema-jsonld');
  if(schEl) schEl.textContent = JSON.stringify({"@context":"https://schema.org","@type":"BlogPosting","headline":data.title,"description":seoDesc,"url":pageUrl,"datePublished":data.published_at||data.created_at,"author":{"@type":"Organization","name":"漫途旅遊誌"},"keywords":kwStr,"inLanguage":"zh-TW"});
  setMeta('meta[property="og:url"]', pageUrl);
  setMeta('meta[property="og:title"]', data.title);
  setMeta('meta[property="og:description"]', data.excerpt||data.title);
  setMeta('meta[property="og:image"]', ogImg);
  setMeta('meta[name="twitter:title"]', data.title);
  setMeta('meta[name="twitter:description"]', data.excerpt||data.title);
  setMeta('meta[name="twitter:image"]', ogImg);
  setMeta('meta[name="description"]', data.excerpt||data.title);
  // canonical link
  let canonical = document.querySelector('link[rel="canonical"]');
  if(!canonical){ canonical=document.createElement('link'); canonical.rel='canonical'; document.head.appendChild(canonical); }
  canonical.href = pageUrl;
// Update meta (legacy)
  document.title = `${data.title} — 漫途旅遊誌`;
  const desc = document.createElement('meta');
  desc.name='description'; desc.content=data.excerpt||'';
  document.head.appendChild(desc);

  const kws = Array.isArray(data.keywords)?data.keywords:[];
  const embedUrl = data.video_url ? getEmbedUrl(data.video_url) : null;

  document.getElementById('article-wrap').innerHTML = `
    <div class="art-header">
      ${data.cover_image
  ? `<div class="art-cover"><img src="${data.cover_image}" alt="${data.title}" 
      style="width:100%;max-height:420px;object-fit:cover;border-radius:8px;margin-bottom:1.5rem;display:block"
      onerror="this.style.display='none';document.querySelector('.art-emoji-fallback').style.display='block'"></div>
     <div class="art-emoji-fallback" style="display:none">${data.emoji||'✍️'}</div>`
  : `<div class="art-emoji">${data.emoji||'✍️'}</div>`
}
      <div class="art-meta">
        ${data.city?`<span>📍 ${data.city}</span>`:''}
        ${data.category?`<span>${data.category}</span>`:''}
        ${data.published_at?`<span>${new Date(data.published_at).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'})}</span>`:''}
      </div>
      <h1 class="art-title">${data.title}</h1>
      ${data.excerpt?`<p class="art-excerpt">${data.excerpt}</p>`:''}
      ${kws.length?`<div class="art-keywords">${kws.map(k=>`<span class="kw-tag">${k}</span>`).join('')}</div>`:''}
    </div>

    ${embedUrl?`<div class="video-wrap"><iframe src="${embedUrl}" allowfullscreen></iframe></div>`:''}

    <div class="art-content">${renderMd(data.content)}</div>

    
${(()=>{
  const url = encodeURIComponent(location.href);
  const title = encodeURIComponent(data.title);
  const fbUrl = 'https://www.facebook.com/sharer/sharer.php?u='+url;
  const lineUrl = 'https://social-plugins.line.me/lineit/share?url='+url;
  const twitterUrl = 'https://twitter.com/intent/tweet?url='+url+'&text='+title;
  return `<div class="share-bar">
    <span class="share-label">分享</span>
    <div class="share-btns">
      <a class="share-btn" href="${fbUrl}" target="_blank" rel="noopener">📘 Facebook</a>
      <a class="share-btn" href="${lineUrl}" target="_blank" rel="noopener">💬 LINE</a>
      <a class="share-btn" href="${twitterUrl}" target="_blank" rel="noopener">𝕏 Twitter</a>
      <button class="share-btn" onclick="copyLink(this)">🔗 複製連結</button>
      <a class="share-btn" href="https://lin.ee/ZBhZQL3" target="_blank" rel="noopener" style="border-color:rgba(0,195,0,0.35);color:#06c755">💬 聯絡我們</a>
    </div>
  </div>`;
})()}
${data.shop_info ? renderShopCard(data.shop_info) : ''}
      <div class="art-footer">
      <a href="/articles" class="back-btn">← 返回文章列表</a>
      <span class="art-date">${data.published_at?'發布於 '+new Date(data.published_at).toLocaleDateString('zh-TW'):''}</span>
    </div>
  `;
}

function notFound(){
  document.getElementById('article-wrap').innerHTML=`
    <div class="not-found">
      <h2>找不到這篇文章</h2>
      <p style="color:var(--text3);margin-bottom:2rem">文章可能已被移除或網址有誤</p>
      <a href="/articles" style="color:var(--accent)">← 返回文章列表</a>
    </div>`;
}

function renderMd(txt){
  if(!txt) return '';
  return txt
    .replace(/<p>####\s+(.+?)<\/p>/g,'<h4>$1</h4>')
    .replace(/<p>###\s+(.+?)<\/p>/g,'<h3>$1</h3>')
    .replace(/<p>##\s+(.+?)<\/p>/g,'<h2>$1</h2>')
    .replace(/<p>#\s+(.+?)<\/p>/g,'<h2>$1</h2>')
    .replace(/^####\s+(.+)$/gm,'<h4>$1</h4>')
    .replace(/^###\s+(.+)$/gm,'<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm,'<h2>$1</h2>')
    .replace(/^#\s+(.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>');
}
function getEmbedUrl(url){
  let m;
  if((m=url.match(/youtube\.com\/watch\?v=([^&]+)/))) return `https://www.youtube.com/embed/${m[1]}`;
  if((m=url.match(/youtu\.be\/([^?]+)/))) return `https://www.youtube.com/embed/${m[1]}`;
  if((m=url.match(/vimeo\.com\/(\d+)/))) return `https://player.vimeo.com/video/${m[1]}`;
  return null;
}

load();
</script>
</body>
</html>
