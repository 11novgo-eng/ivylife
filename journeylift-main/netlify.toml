[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/admin"
  to = "/admin-v2.html"
  status = 200
  force = true

[[redirects]]
  from = "/articles/:slug"
  to = "/articles/article.html"
  status = 200

[[redirects]]
  from = "/articles"
  to = "/articles/index.html"
  status = 200

[[headers]]
  for = "/admin-v2.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/tools/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/articles*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[edge_functions]]
  function = "og-meta"
  path = "/articles/:slug"

[functions.claude-proxy]
  timeout = 26

