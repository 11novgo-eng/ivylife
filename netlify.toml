[[redirects]]
  from = "/article/:slug"
  to = "/articles/article.html"
  status = 200
  force = false

[[redirects]]
  from = "/:slug.html"
  to = "/article.html?slug=:slug"
  status = 200
  force = false

[[redirects]]
  from = "/articles/:slug.html"
  to = "/article.html?slug=:slug"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
