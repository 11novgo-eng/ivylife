<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="page-title">IvyLife 艾薇生活</title>
<meta name="description" id="meta-desc" content="艾薇的生活分享">
<link rel="canonical" id="canonical-url" href="https://ivylife.com.tw">
<meta property="og:title" id="og-title" content="IvyLife">
<meta property="og:description" id="og-desc" content="">
<meta property="og:image" id="og-image" content="https://ivylife.com.tw/og-default.jpg">
<meta property="og:type" content="article">
<link rel="stylesheet" href="/css/style.css">
<style>
.art-wrap{max-width:780px;margin:0 auto;padding:2rem 1.5rem 4rem}
.art-cover{width:100%;max-height:450px;object-fit:cover;border-radius:12px;margin-bottom:2rem;display:block}
.art-cat-badge{display:inline-block;font-size:0.78rem;color:var(--rose-deep,#c9697a);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.6rem;background:rgba(242,160,147,0.1);padding:0.2rem 0.7rem;border-radius:20px}
.art-title{font-family:var(--font-serif,serif);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:600;line-height:1.3;margin-bottom:1rem;color:var(--text-dark,#2c2c2c)}
.art-meta{font-size:0.82rem;color:var(--text-light,#888);margin-bottom:1.5rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.art-synopsis{font-size:1.05rem;line-height:1.8;color:var(--text,#555);border-left:3px solid var(--rose,#F2A093);padding-left:1rem;margin-bottom:2rem;font-style:italic}
.art-content{font-size:1rem;line-height:1.9;color:var(--text,#555)}
.art-content h2{font-family:var(--font-serif,serif);font-size:1.35rem;font-weight:600;margin:2rem 0 0.8rem;color:var(--text-dark,#2c2c2c)}
.art-content h3{font-size:1.15rem;font-weight:600;margin:1.5rem 0 0.6rem;color:var(--text-dark,#2c2c2c)}
.art-content p{margin-bottom:1.2rem}
.art-content img{width:100%;border-radius:8px;margin:1rem 0}
.art-back{display:inline-flex;align-items:center;gap:0.4rem;color:var(--rose-deep,#c9697a);text-decoration:none;font-size:0.85rem;margin-bottom:1.5rem;opacity:0.8}
.art-back:hover{opacity:1;text-decoration:underline}
.loading-state,.error-state{text-align:center;padding:4rem 2rem;color:var(--text-light,#888)}
.art-footer-line{border-top:1px solid var(--border,#eee);margin-top:3rem;padding-top:2rem;text-align:center;font-size:0.85rem;color:var(--text-light,#888)}
</style>
<script src="/js/supabase.js"></script>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a class="nav-logo" href="/">Ivy<span>Life</span></a>
<ul class="nav-links" id="navLinks">
<li><a href="/category.html?cat=tastyfood">美食餐廳</a></li>
<li><a href="/category.html?cat=hotel">飯店民宿</a></li>
<li><a href="/category.html?cat=beauty">醫學美容</a></li>
<li><a href="/category.html?cat=renovation">宅修清潔</a></li>
<li><a href="/category.html?cat=furniture">設計推薦</a></li>
<li><a href="/about.html">關於艾薇</a></li>
</ul>
<div class="nav-hamburger" id="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')"><span></span><span></span><span></span></div>
</div></nav>
<main>
  <div id="art-wrap" class="art-wrap">
    <div class="loading-state"><p>載入中…</p></div>
  </div>
</main>
<footer class="footer">
  <div class="footer-inner" style="text-align:center;padding:2rem;font-size:0.85rem;color:var(--text-light,#888)">
    <p>© 2026 IvyLife 艾薇生活 · 用文字記錄每一刻美好</p>
  </div>
</footer>
<script>

  document.getElementById('hamburger')?.addEventListener('click',()=>{
    document.getElementById('navLinks')?.classList.toggle('open');
  });
async function load(){
  const parts = location.pathname.split('/').filter(Boolean);
  const slug = decodeURIComponent(parts[parts.length-1]);
  const wrap = document.getElementById('art-wrap');
  if(!slug){ wrap.innerHTML='<div class="error-state"><h2>找不到文章</h2><p><a href="/">回首頁</a></p></div>'; return; }
  try{
    const data = await getArticleBySlug(slug);
    if(!data){
      wrap.innerHTML='<div class="error-state"><h2>文章不存在</h2><p><a href="/">回首頁</a></p></div>';
      return;
    }
    const catName = data.ivy_categories?.name || '';
    const catSlug = data.ivy_categories?.slug || '';
    const pubDate = formatDate(data.published_at||data.created_at);
    
    // SEO meta
    document.getElementById('page-title').textContent = (data.meta_title||data.title)+' - IvyLife';
    document.getElementById('meta-desc').content = data.meta_description||data.synopsis||'';
    document.getElementById('canonical-url').href = 'https://ivylife.com.tw/article/'+slug;
    document.getElementById('og-title').content = data.title;
    document.getElementById('og-desc').content = data.meta_description||data.synopsis||'';
    if(data.cover_image) document.getElementById('og-image').content = data.cover_image;
    
    wrap.innerHTML = `
      <a class="art-back" href="${catSlug?'/category.html?cat='+catSlug:'/'}">← ${catName||'返回首頁'}</a>
      ${data.cover_image?`<img class="art-cover" src="${data.cover_image}" alt="${data.title}" onerror="this.style.display='none'">`:''}
      ${catName?`<div><span class="art-cat-badge">${catName}</span></div>`:''}
      <h1 class="art-title">${data.title}</h1>
      <div class="art-meta">
        ${pubDate?`<span>📅 ${pubDate}</span>`:''}
        ${catName?`<span>📁 ${catName}</span>`:''}
      </div>
      ${data.synopsis?`<p class="art-synopsis">${data.synopsis}</p>`:''}
      <div class="art-content">${data.content||'<p>內容準備中…</p>'}</div>
      <div class="art-footer-line">感謝閱讀 · 艾薇生活</div>
    `;
  }catch(e){
    console.error('load error:', e);
    wrap.innerHTML='<div class="error-state"><h2>載入失敗</h2><p>'+e.message+'</p><p><a href="/">回首頁</a></p></div>';
  }
}
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
