</div>

</div><div class="footer-bottom"><p>© 2024 IvyLife 艾薇生活</p></div></footer>
<script src="/js/supabase.js"></script>
<script>
const PAGE_SIZE=12;let pg=0;
async function loadPage(p=0){
  const params=new URLSearchParams(window.location.search);
  const catSlug=params.get('cat')||'';
  try{
    const cats=await getCategories();
    const c=cats.find(x=>x.slug===catSlug);
    if(c){
      document.title=c.name+' - IvyLife';
      document.getElementById('metaTitle').textContent=c.name+' - IvyLife';
      document.getElementById('metaDesc').content=c.description||'';
      document.getElementById('canonical').href='https://ivylife.com.tw/category.html?cat='+catSlug;
      document.getElementById('catIcon').textContent=c.icon||'';
      document.getElementById('catTitle').textContent=c.name;
      document.getElementById('catDesc').textContent=c.description||'';
      document.getElementById('breadCat').textContent=c.name;
    }
    const as=await getArticles({categorySlug:catSlug,limit:PAGE_SIZE,offset:p*PAGE_SIZE});
    const g=document.getElementById('articleGrid');
    if(!as.length&&p===0){g.innerHTML='<p style="grid-column:1/-1;text-align:center;color:var(--text-light);padding:3rem">此分類尚無文章</p>';return;}
    g.innerHTML=as.map(a=>'<a class="article-card fade-in" href="/'+a.slug+'.html" style="text-decoration:none;color:inherit"><div class="card-img">'+categoryIcon(a.ivy_categories?.name||'')+'</div><div class="card-body"><span class="card-category">'+(a.ivy_categories?.name||'')+'</span><h3 class="card-title">'+a.title+'</h3><p class="card-synopsis">'+(a.synopsis||'')+'</p><span class="card-meta">'+formatDate(a.created_at)+'</span></div></a>').join('');
    let pag='';
    if(p>0)pag+='<a href="#" onclick="changePage('+(p-1)+')">‹</a>';
    pag+='<span class="active">'+(p+1)+'</span>';
    if(as.length===PAGE_SIZE)pag+='<a href="#" onclick="changePage('+(p+1)+')">›</a>';
    document.getElementById('pagination').innerHTML=pag;
  }catch(e){document.getElementById('articleGrid').innerHTML='<p style="grid-column:1/-1">'+e.message+'</p>';}
}
function changePage(p){pg=p;window.scrollTo(0,0);loadPage(p);return false;}
loadPage();
</script>
</body></html>
